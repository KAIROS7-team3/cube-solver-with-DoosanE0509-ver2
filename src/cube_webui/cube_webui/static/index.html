<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cube Solver WebUI</title>
<link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <h1>Cube Solver</h1>
    <div class="status">
      <span class="label">FSM</span>
      <span id="state" class="badge state-idle">IDLE</span>
    </div>
    <div class="controls">
      <button id="btn-scan" class="primary">Start Scan</button>
      <button id="btn-solve" class="secondary">Start Solve</button>
      <button id="btn-run" class="primary-alt">Start Run</button>
      <button id="btn-cancel" class="danger">Cancel</button>
      <button id="btn-estop" class="estop">🛑 비상정지</button>
    </div>
    <div id="ctrl-status" class="ctrl-status"></div>
  </header>

  <main>
    <section class="camera">
      <h2>Camera</h2>
      <div class="camera-wrap">
        <img id="cam" src="/stream/camera.mjpg" alt="camera stream" />
      </div>
      <div class="detection">
        <h3>Last detection</h3>
        <div id="detection">대기 중…</div>
      </div>
    </section>

    <section class="faces">
      <h2>Face colors</h2>
      <div id="face-grid" class="face-grid"></div>
    </section>

    <section class="solution">
      <h2>Solution</h2>
      <div class="current-token">
        <span class="label">현재 토큰</span>
        <span id="current-token" class="token-active">-</span>
      </div>
      <div id="tokens" class="tokens"></div>
      <form id="manual-solve-form" class="manual">
        <input id="manual-solution" type="text" placeholder="풀이 직접 입력 (비우면 캐시 사용)" autocomplete="off" />
        <button type="submit" class="secondary">Solve with this</button>
      </form>
      <form id="manual-form" class="manual">
        <input id="manual-token" type="text" placeholder="수동 토큰 (예: U, R', F2)" autocomplete="off" />
        <button type="submit">Send token</button>
        <span id="manual-result" class="manual-result"></span>
      </form>
    </section>

    <section class="faults">
      <h2>Faults</h2>
      <ul id="fault-log"></ul>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
